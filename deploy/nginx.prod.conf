# DecentGPU — Production Nginx
#
# Traffic routing:
#   gpu.candeniz.me              → this nginx (frontend + REST API + terminal WS)
#   ws-bootstrap.gpu.candeniz.me → bootstrap:9002 directly (P2P WebSocket)
#   ws-master.gpu.candeniz.me    → master:9012 directly    (P2P WebSocket)
#
# NOTE: libp2p WebSocket transport always connects to path "/" — path-based
# P2P routing via nginx is not possible. P2P traffic uses separate Cloudflare
# hostnames that bypass nginx entirely.

events { worker_connections 1024; }

http {
    upstream frontend { server frontend:3000; }
    upstream master   { server master:8888;   }

    server {
        listen 80;
        server_name _;
        client_max_body_size 512M;

        # ── Job terminal WebSocket (live logs — must come before /api/) ──────
        location ~ ^/api/jobs/[^/]+/terminal {
            proxy_pass         http://master;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://master;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Health ────────────────────────────────────────────────────────────
        location /health {
            proxy_pass       http://master;
            proxy_set_header Host $host;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
