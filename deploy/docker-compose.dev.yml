services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: decentgpu
      POSTGRES_PASSWORD: decentgpu
      POSTGRES_DB: decentgpu
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decentgpu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
